name: K8s Container Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write  # Autorise la publication sur GHCR

jobs:
  # Job 1 : Construire et publier l'image sur GHCR
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Définir le nom de l'image en minuscules
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/webapp" >> "$GITHUB_ENV"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

  # Job 2 : Déployer sur un cluster Kubernetes éphémère (kind)
  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Définir le nom de l'image en minuscules
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/webapp" >> "$GITHUB_ENV"

      - name: Créer un cluster Kubernetes éphémère (kind)
        uses: helm/kind-action@v1
        with:
          cluster_name: tp3

      - name: Créer le secret pour tirer l'image depuis GHCR
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Remplacer IMAGE_PLACEHOLDER et déployer
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}:${GITHUB_SHA}|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/webapp --timeout=120s

      - name: Smoke test
        run: |
          kubectl get pods -o wide
          kubectl get svc webapp
          kubectl port-forward svc/webapp 8080:80 &
          sleep 5
          curl -s http://localhost:8080/ | grep -i "hello"
